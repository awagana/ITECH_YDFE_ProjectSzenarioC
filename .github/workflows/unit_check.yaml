name: Unit Check

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write

jobs:
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        language: [python, javascript, html]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # ---------- Python ----------
      - name: Set up Python
        if: matrix.language == 'python'
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Python test dependencies
        if: matrix.language == 'python'
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run Python unit tests
        if: matrix.language == 'python'
        id: python-test
        shell: bash
        run: |
          pytest --tb=short 2>&1 | tee test_output.txt
          exit ${PIPESTATUS[0]}
        continue-on-error: true

      # ---------- JavaScript ----------
      - name: Set up Node.js
        if: matrix.language == 'javascript'
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Jest
        if: matrix.language == 'javascript'
        run: npm install -g jest
        timeout-minutes: 10

      - name: Run JavaScript unit tests
        if: matrix.language == 'javascript'
        id: js-test
        shell: bash
        run: |
          jest --passWithNoTests 2>&1 | tee test_output.txt
          exit ${PIPESTATUS[0]}
        continue-on-error: true

      # ---------- HTML ----------
      - name: Set up Node.js for HTML
        if: matrix.language == 'html'
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install html-validate
        if: matrix.language == 'html'
        run: npm install -g html-validate
        timeout-minutes: 10

      - name: Run HTML validation
        if: matrix.language == 'html'
        id: html-test
        shell: bash
        run: |
          find . -name "*.html" -not -path "./.git/*" | xargs html-validate 2>&1 | tee test_output.txt
          exit ${PIPESTATUS[0]}
        continue-on-error: true

      # ---------- Post review with REQUEST_CHANGES if tests failed ----------
      - name: Post review with REQUEST_CHANGES if tests failed
        if: |
          (matrix.language == 'python' && steps.python-test.outcome == 'failure') ||
          (matrix.language == 'javascript' && steps.js-test.outcome == 'failure') ||
          (matrix.language == 'html' && steps.html-test.outcome == 'failure')
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
          script: |
            const fs = require('fs');
            const testOutput = fs.readFileSync('test_output.txt', 'utf8');
            const lang = '${{ matrix.language }}';
            const emoji = lang === 'python' ? '🐍' : lang === 'javascript' ? '🟨' : '🌐';
            const tool = lang === 'python' ? 'pytest' : lang === 'javascript' ? 'Jest' : 'html-validate';

            const body = `## ${emoji} ${tool} Unit-Test Fehler gefunden\n\n` +
              `Die folgenden Fehler wurden in diesem PR gefunden:\n\n` +
              `\`\`\`\n${testOutput}\n\`\`\`\n\n` +
              `Bitte korrigiere alle Fehler und pushe die Änderungen.`;

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              event: 'REQUEST_CHANGES',
              body: body
            });
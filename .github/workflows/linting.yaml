name: Lint Check

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  lint:
    name: Lint Python & JS
    runs-on: ubuntu-latest
    strategy:
      matrix:
        language: [python, javascript]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # ---------- Python ----------
      - name: Set up Python
        if: matrix.language == 'python'
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        if: matrix.language == 'python'
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Lint Python code
        if: matrix.language == 'python'
        run: flake8 .
        continue-on-error: true
        id: python-lint

      # ---------- JavaScript ----------
      - name: Set up Node.js
        if: matrix.language == 'javascript'
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install ESLint globally
        if: matrix.language == 'javascript'
        run: npm install -g eslint
        timeout-minutes: 10

      - name: Lint JS code
        if: matrix.language == 'javascript'
        run: eslint .
        continue-on-error: true
        id: js-lint

      # ---------- Comment PR if failed ----------
      - name: Comment on PR if lint failed
        if: ${{ failure() }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const messages = [];
            if (steps['python-lint'].conclusion !== 'success') {
              messages.push("Python Lint failed. Bitte flake8 Fehler korrigieren.");
            }
            if (steps['js-lint'].conclusion !== 'success') {
              messages.push("JavaScript Lint failed. Bitte eslint Fehler korrigieren.");
            }
            if (messages.length > 0) {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: messages.join("\n")
              });
            }
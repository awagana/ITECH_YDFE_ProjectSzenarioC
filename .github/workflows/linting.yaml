name: Lint Check

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write

jobs:
  lint:
    name: Lint Python & JS
    runs-on: ubuntu-latest
    strategy:
      matrix:
        language: [python, javascript]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # ---------- Python ----------
      - name: Set up Python
        if: matrix.language == 'python'
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        if: matrix.language == 'python'
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Lint Python code
        if: matrix.language == 'python'
        id: python-lint
        shell: bash
        run: |
          flake8 . --ignore=E501 2>&1 | tee lint_output.txt
          exit ${PIPESTATUS[0]}
        continue-on-error: true

      # ---------- JavaScript ----------
      - name: Set up Node.js
        if: matrix.language == 'javascript'
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install ESLint globally
        if: matrix.language == 'javascript'
        run: npm install -g eslint
        timeout-minutes: 10

      - name: Lint JS code
        if: matrix.language == 'javascript'
        id: js-lint
        shell: bash
        run: |
          eslint . 2>&1 | tee lint_output.txt
          exit ${PIPESTATUS[0]}
        continue-on-error: true

      # ---------- Post review with REQUEST_CHANGES if lint failed ----------
      - name: Post review with REQUEST_CHANGES if lint failed
        if: |
          (matrix.language == 'python' && steps.python-lint.outcome == 'failure') ||
          (matrix.language == 'javascript' && steps.js-lint.outcome == 'failure')
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
          script: |
            const fs = require('fs');
            const lintOutput = fs.readFileSync('lint_output.txt', 'utf8');
            const lang = '${{ matrix.language }}';
            const emoji = lang === 'python' ? '🐍' : '🟨';
            const linter = lang === 'python' ? 'flake8' : 'ESLint';

            const body = `## ${emoji} ${linter} Lint-Fehler gefunden\n\n` +
              `Die folgenden Lint-Fehler wurden in diesem PR gefunden:\n\n` +
              `\`\`\`\n${lintOutput}\n\`\`\`\n\n` +
              `Bitte korrigiere alle Fehler und pushe die Änderungen.`;

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              event: 'REQUEST_CHANGES',
              body: body
            });